server:
  port: 8080

spring:
  cloud:
    gateway:
      mvc: 
        routes:
          - id: operator-service
            uri: lb://OPERATOR-SERVICE
            predicates:
              - Path=/operators/**
          - id: recharge-service
            uri: lb://RECHARGE-SERVICE
            predicates:
              - Path=/recharge/**
          - id: payment-service
            uri: lb://PAYMENT-SERVICE
            predicates:
              - Path=/payment/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
