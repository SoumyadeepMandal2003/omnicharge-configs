server:
  port: 8080

spring:
  cloud:
    gateway:
      mvc:
        routes:
          - id: user-service
            uri: lb://USER-SERVICE
            predicates:
              - Path=/users/**, /auth/**
          - id: operator-service
            uri: lb://OPERATOR-SERVICE
            predicates:
              - Path=/operators/**
          - id: recharge-service
            uri: lb://RECHARGE-SERVICE
            predicates:
              - Path=/recharge/**
          - id: payment-service
            uri: lb://PAYMENT-SERVICE
            predicates:
              - Path=/payment/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

jwt:
  secret: "mysecretkeymysecretkeymysecretkey12345"



springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: User Service
        url: /users/v3/api-docs
      - name: Operator Service
        url: /operators/v3/api-docs
      - name: Payment Service
        url: /payment/v3/api-docs
      - name: Recharge Service
        url: /recharge/v3/api-docs
