server:
  port: 8083

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/omnicharge_recharge
    username: root
    password: user
  jpa:
    hibernate:
      ddl-auto: update
  rabbitmq:
    host: localhost

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

resilience4j:
  circuitbreaker:
    instances:
      operatorService:
        registerHealthIndicator: true
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
